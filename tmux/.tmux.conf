# --------Tmux Plugins--------

set -g @plugin 'tmux-plugins/tpm' # Plugin Manager
set -g @plugin 'tmux-plugins/tmux-yank' # Yank to clipboard
set -g @plugin 'tmux-plugins/tmux-sensible' # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # Prefix indicator
set -g @plugin 'nhdaly/tmux-better-mouse-mode' # Mouse Mods
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
set -g @plugin 'tmux-plugins/tmux-pain-control' # Better pane handling
set -g @plugin 'tmux-plugins/tmux-resurrect' # Persist after restart
set -g @plugin 'tmux-plugins/tmux-continuum' # Automatically save
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @plugin 'sainnhe/tmux-fzf'  # fzf-powered session/window/pane picker (prefix-F)
set -g @plugin 'laktak/extrakto'   # fuzzy-grab any text on screen (prefix-Tab)

# -------Terminal capabilities-------
# tmux-256color is the modern terminfo entry — supports italics, undercurl,
# 256 colors. macOS doesn't always ship it; if `tmux: unknown terminal` errors
# appear, fall back to 'screen-256color'.
set -g default-terminal "tmux-256color"
# Truecolor (24-bit) pass-through for outer terminals that support it
# (ghostty, iTerm2 with TrueColor on, modern Linux terminals).
set -ga terminal-features ",xterm-256color:RGB,xterm-ghostty:RGB,alacritty:RGB"
# terminal-overrides as a backup for older tmux that doesn't honor features.
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# -------Behavior Settings-------

# Increase history limit to 100k.
set -g history-limit 100000

# Kill the half-second ESC delay (vim/nvim users will thank you).
set -sg escape-time 0

# Window/pane numbering starts at 1 — matches the number row on the keyboard
# (prefix-1 → window 1, not "window 0 doesn't exist").
set -g base-index 1
setw -g pane-base-index 1

# Renumber remaining windows when one is closed (no holes in the window list).
set -g renumber-windows on

# Pass focus events to programs running inside (vim/nvim autoreload, etc.).
set -g focus-events on

# Aggressive resize: when sharing a session, size to the smallest CURRENT
# client viewing the active window — not the whole session.
setw -g aggressive-resize on

# Status bar: clock + mouse state + prefix indicator.
set -g status-right '#{prefix_highlight} Mouse #{?mouse,On,Off} | %a %Y-%m-%d %H:%M'

# Set terminal title to host/session.
set -g set-titles on
set -g set-titles-string "#h/#S"

# ---------Key Bindings----------

# Send the prefix to client inside window
bind-key C-b send-prefix

# [m/M] -> Bind mouse mode on/off and enable by default
bind-key m set -g mouse on
bind-key M set -g mouse off
set -g mouse on

# [r] -> Reload Settings
bind-key r source-file ~/.tmux.conf

# [d] -> Detatch From Session
bind-key d detach

# --------TPM Requirement--------


run -b '~/.tmux/plugins/tpm/tpm'
