# Dotfiles command hints — sourced by command-hints.zsh
#
# Set _DOTFILES_HINT_RULES to a list of rules (pipe-separated fields):
#   daily|<cmd>|<binary>   — once per calendar day (local TZ), if <binary> is on PATH
#   md|<cmd>|<binary>    — whenever <cmd> is run with a *.md argument, if <binary> exists
#
# For a given line, at most one "md" hint prints; "daily" is skipped when any
# *.md argument is present (so the first `cat README.md` of the day nudges glow, not bat).
#
# Disable entirely: export DOTFILES_COMMAND_HINTS=0 before .zshrc, or empty this array.

typeset -ga _DOTFILES_HINT_RULES
_DOTFILES_HINT_RULES=(
  'daily|cat|bat'
  'md|cat|glow'
)
